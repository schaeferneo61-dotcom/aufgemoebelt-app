name: ProSonata Auto-Sync

on:
  schedule:
    # Alle 5 Minuten (GitHub-Minimum)
    - cron: '*/5 * * * *'
  # Manuell auslösbar (verhindert auch das automatische Deaktivieren)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: ProSonata → Supabase Sync
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            https://warenwirtschaft-blush.vercel.app/api/sync-prosonata)

          http_status=$(echo "$body" | tail -1 | sed 's/HTTP_STATUS://')
          response_body=$(echo "$body" | sed '$d')

          echo "HTTP Status: $http_status"
          echo "Response: $response_body"

          if [ "$http_status" != "200" ]; then
            echo "Sync fehlgeschlagen mit Status $http_status"
            exit 1
          fi

          echo "Sync erfolgreich"
